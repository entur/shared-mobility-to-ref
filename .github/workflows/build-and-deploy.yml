name: "Manual Build and Publish"

on:
  workflow_call:
    inputs:
      environment:
        description: Environment to deploy to
        type: string
        required: true
        default: dev
jobs:
  makeImageTag:
    uses: ./.github/workflows/make-image.yml
  check-build:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    needs: makeImageTag
    steps:
      - name: Authenticate with the cloud provider
        id: auth
        uses: entur/gha-meta/.github/actions/docker-auth@v1
        with:
          gcp_workload_identity_provider: ${{ vars.CI_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ vars.CI_SERVICE_ACCOUNT }}
      - name: Echo Docker image to be deployed
        run: |
          tags=$(gcloud container images list-tags --filter="tags:${{ needs.makeImageTag.outputs.image_version }}" --format=json eu.gcr.io/entur-system-1287/${{ needs.makeImageTag.outputs.image_name }}) 
          if [[ "$tags" == "[]" ]]; then
            printf "tag does not exist"
            echo "image_exists=false" >> $GITHUB_ENV
          else
            printf "tag exists: $tags"
            echo "image_exists=true" >> $GITHUB_ENV
          fi
    outputs:
      image_exists: ${{ env.image_exists }}
  build:
    needs: [makeImageTag, check-build]
    if: ${{ needs.check-build.outputs.image_exists == 'false' }}
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.makeImageTag.outputs.image_version }}
    secrets: inherit
  publish:
    needs: [makeImageTag, check-build, build]
    if: ${{ needs.check-build.outputs.image_exists == 'false' }}
    name: Docker Push and Publish Documentation
    uses: ./.github/workflows/publish.yml
    secrets: inherit
    with:
        version: ${{ needs.makeImageTag.outputs.image_version }}
  echo-image:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Echo image name and tag
        run: |
          echo "Image name: ${{ github.repository }}"
          echo "Image tag: ${{ needs.publish.outputs.image }}"
  deploy:
    needs: [publish, makeImageTag]
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') }}
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: ${{ inputs.environment }}
      image: ${{ needs.makeImageTag.outputs.image_name }}:${{ needs.makeImageTag.outputs.image_version }}
